{% extends 'basic.html' %}

{% block content %}
<main class="container d-flex align-items-center justify-content-center" style="min-height: 85vh;">
    <div class="row w-100">
        <div class="col-md-5 mx-auto text-center">

            <h1 class="display-4 fw-bold text-dark mb-5">App de Tienda</h1>

            <div class="mb-5">
                <a href="{% url 'register_sale' %}" class="btn btn-success btn-lg py-4 w-100 shadow-sm rounded-4 fs-2 fw-bold">
